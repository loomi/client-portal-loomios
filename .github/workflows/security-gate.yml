name: Security Gate

# Escaneia as dependências (libs) de back-end e front-end contra vulnerabilidades
# conhecidas (GHSA + OSV + NVD via Trivy). Bloqueia o merge quando há HIGH/CRITICAL
# e, quando falha, apresenta o relatório detalhado por CVE de forma descritiva:
# no resumo do job, como anotação de erro e como comentário na Pull Request.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Reescaneia toda segunda 06:00 UTC — pega CVEs novos em libs que não mudaram.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # enviar SARIF ao GitHub Code Scanning
  pull-requests: write # comentar o relatório na PR quando o gate falhar

env:
  SECURITY_THRESHOLD: HIGH

jobs:
  scan:
    name: Trivy dependency scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [back-end, front-end]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Garante o lockfile (Trivy escaneia o package-lock.json, sem node_modules).
      - name: Ensure lockfile
        working-directory: ${{ matrix.project }}
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only --no-audit --no-fund
          fi

      # Trivy gera o JSON cru (sem falhar aqui — o gate é o nosso parser).
      - name: Trivy scan (JSON)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.project }}
          scanners: vuln
          format: json
          output: trivy-${{ matrix.project }}.json
          severity: LOW,MEDIUM,HIGH,CRITICAL
          exit-code: '0'

      # Mesmo parser do `make security`: relatório detalhado + gate (exit 1).
      # Gera report-<proj>.md (descritivo) ANTES de eventualmente falhar.
      - name: Security Gate report
        id: gate
        run: |
          node scripts/lib/security-report.mjs \
            --threshold "${SECURITY_THRESHOLD}" \
            --detailed \
            --markdown "report-${{ matrix.project }}.md" \
            "${{ matrix.project }}::trivy-${{ matrix.project }}.json::${{ matrix.project }}/package.json"

      # Publica o relatório detalhado no resumo do job (sempre).
      - name: Publish report to job summary
        if: always()
        run: |
          {
            echo "## 🔒 Security Gate — ${{ matrix.project }}"
            echo ""
            cat "report-${{ matrix.project }}.md"
          } >> "$GITHUB_STEP_SUMMARY"

      # Anotação de erro descritiva no topo do run quando o gate falha.
      - name: Error annotation
        if: failure() && steps.gate.outcome == 'failure'
        run: |
          echo "::error title=Security Gate falhou (${{ matrix.project }})::Vulnerabilidades >= ${SECURITY_THRESHOLD} encontradas. Veja o Job Summary e o comentário na PR para os CVEs e as versões a atualizar."

      # Comenta o relatório descritivo na PR (sticky por subprojeto) quando falha.
      - name: Comment report on PR
        if: failure() && steps.gate.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const project = '${{ matrix.project }}';
            const marker = `<!-- security-gate:${project} -->`;
            const body = `${marker}\n## ❌ Security Gate falhou — \`${project}\`\n\n` +
              fs.readFileSync(`report-${project}.md`, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      # SARIF para a aba Security → Code scanning (não falha; roda sempre).
      - name: Trivy scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.project }}
          scanners: vuln
          format: sarif
          output: trivy-${{ matrix.project }}.sarif
          severity: LOW,MEDIUM,HIGH,CRITICAL

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.project }}.sarif
          category: trivy-${{ matrix.project }}
